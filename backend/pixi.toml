# ============================================================================
# Pixi manifest for the VNDB backend.
#
# Pixi gives us a reproducible per-project environment: Python 3.13, the
# PostgreSQL server binary, psycopg2 (compiled, so no Windows C-compiler
# dance), and every PyPI dep pinned to the same versions as requirements.txt.
#
# First-time setup (run once after cloning):
#     ./scripts/pixi-setup.ps1     # or: pixi install
#
# Running the backend (all modes go through launch.py):
#     pixi run dev                 # Flask dev server (launch.py dev)
#     pixi run dev-waitress        # Waitress in dev (launch.py dev --waitress)
#     pixi run prod                # Production launcher (launch.py prod)
#     pixi run prod -- --next-port 5004
#                                  # `--` forwards extra flags to launch.py prod
#
# `pixi run` puts the env's bin/ on PATH first, so `python` and any other
# conda-installed tools resolve to the env copies. Postgres, Redis, and
# Caddy are kept on the system PATH (installed via scoop / system installer)
# — the launcher's binary checks will warn if any are missing.
# ============================================================================

[workspace]
name = "vndb-backend"
version = "0.1.0"
description = "Visual Novel Database backend (Flask + Celery + Redis + Postgres + Caddy)"
authors = ["KOBAYASHI"]
channels = ["conda-forge"]
platforms = ["win-64"]

[dependencies]
python = "3.13.*"
# Driver. Conda's psycopg2 ships compiled — avoids the source-build pain
# that the PyPI distribution hits on Windows without MSVC + libpq headers.
#
# Note: PostgreSQL server itself is NOT a pixi dependency — we rely on the
# user's existing system install (scoop / installer / service). Adding it
# here would put a different postgres version on PATH first, which would
# refuse to start a data dir initialized by the system version
# (`PG_VERSION mismatch`).
psycopg2 = "*"

# Python deps mirror backend/requirements.txt. Keep these in sync when
# either side changes — `pixi list` will flag drift.
[pypi-dependencies]
alembic = "==1.16.4"
amqp = "==5.3.1"
anyio = "==4.9.0"
APScheduler = "==3.11.0"
billiard = "==4.2.1"
blinker = "==1.9.0"
cachelib = "==0.13.0"
celery = "==5.5.3"
certifi = "==2025.7.14"
click = "==8.2.1"
click-didyoumean = "==0.3.1"
click-plugins = "==1.1.1.2"
click-repl = "==0.3.0"
colorama = "==0.4.6"
dotenv = "==0.9.9"
Faker = "==37.4.2"
Flask = "==3.1.1"
Flask-APScheduler = "==1.13.1"
Flask-Caching = "==2.3.1"
flask-cors = "==6.0.1"
Flask-JWT-Extended = "==4.7.1"
Flask-Limiter = "==3.8.0"
Flask-Login = "==0.6.3"
Flask-Migrate = "==4.1.0"
Flask-SQLAlchemy = "==3.1.1"
flower = "==2.0.1"
greenlet = "==3.2.3"
h11 = "==0.16.0"
httpcore = "==1.0.9"
httpx = "==0.28.1"
humanize = "==4.12.3"
idna = "==3.10"
itsdangerous = "==2.2.0"
Jinja2 = "==3.1.6"
kombu = "==5.5.4"
Mako = "==1.3.10"
MarkupSafe = "==3.0.2"
packaging = "==25.0"
prometheus_client = "==0.22.1"
prompt_toolkit = "==3.0.51"
PyJWT = "==2.10.1"
python-dateutil = "==2.9.0.post0"
python-dotenv = "==1.1.1"
pytz = "==2025.2"
redis = "==6.2.0"
six = "==1.17.0"
sniffio = "==1.3.1"
SQLAlchemy = "==2.0.41"
tornado = "==6.5.1"
typing_extensions = "==4.14.1"
tzdata = "==2025.2"
tzlocal = "==5.3.1"
vine = "==5.1.0"
waitress = "==3.0.2"
