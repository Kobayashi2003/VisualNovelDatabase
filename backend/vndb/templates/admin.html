<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; }

        body {
            font-family: Arial, sans-serif;
            max-width: 760px;
            margin: 40px auto;
            padding: 0 24px;
            color: #333;
            background: #f0f2f5;
        }

        h1 {
            color: #2c3e50;
            border-bottom: 2px solid #2c3e50;
            padding-bottom: 8px;
            margin-bottom: 24px;
        }

        h2 {
            color: #2c3e50;
            font-size: 15px;
            text-transform: uppercase;
            letter-spacing: .05em;
            margin: 0 0 16px;
        }

        section {
            background: #fff;
            border: 1px solid #dee2e6;
            border-radius: 6px;
            padding: 24px;
            margin-bottom: 20px;
        }

        /* ── Query mode ─────────────────────────────────────── */
        .mode-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 14px;
            font-size: 14px;
        }

        .mode-row span { color: #555; }

        .badge {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: bold;
        }

        .badge-normal   { background: #d4edda; color: #155724; }
        .badge-local    { background: #cce5ff; color: #004085; }
        .badge-remote   { background: #fff3cd; color: #856404; }
        .badge-disabled { background: #f8d7da; color: #721c24; }

        .radio-group {
            display: flex;
            flex-wrap: wrap;
            gap: 6px 20px;
            margin-bottom: 16px;
        }

        .radio-group label {
            display: flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
            font-size: 14px;
        }

        .radio-group small { color: #777; font-size: 12px; }

        /* ── Backfill ────────────────────────────────────────── */
        .field-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
        }

        .field-row > .label {
            width: 100px;
            flex-shrink: 0;
            font-size: 14px;
            font-weight: bold;
            color: #444;
        }

        select, input[type="text"] {
            padding: 7px 10px;
            border: 1px solid #ced4da;
            border-radius: 4px;
            font-size: 14px;
            color: #333;
        }

        input[type="text"] { width: 280px; }

        /* ── Buttons ─────────────────────────────────────────── */
        .btn {
            background: #007bff;
            color: #fff;
            border: none;
            padding: 8px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }

        .btn:hover:not(:disabled) { background: #0056b3; }
        .btn:disabled { background: #adb5bd; cursor: not-allowed; }

        /* ── Log console ─────────────────────────────────────── */
        #backfill-log {
            font-family: 'Courier New', monospace;
            font-size: 13px;
            background: #1e1e2e;
            color: #cdd6f4;
            border-radius: 4px;
            padding: 12px 14px;
            margin-top: 14px;
            min-height: 44px;
            white-space: pre-wrap;
            word-break: break-all;
            display: none;
        }

        .log-info { color: #89b4fa; }
        .log-ok   { color: #a6e3a1; }
        .log-err  { color: #f38ba8; }

        /* ── Inline feedback ─────────────────────────────────── */
        .feedback {
            display: inline-block;
            margin-left: 12px;
            font-size: 13px;
            vertical-align: middle;
        }
    </style>
</head>
<body>

<h1>Admin</h1>

<!-- ─── Query Mode ─────────────────────────────────────────────────────────── -->
<section>
    <h2>Query Mode</h2>

    <div class="mode-row">
        <span>Current:</span>
        <span id="current-mode" class="badge">—</span>
    </div>

    <div class="radio-group">
        <label>
            <input type="radio" name="qmode" value="default">
            Default <small>(remote → local fallback)</small>
        </label>
        <label>
            <input type="radio" name="qmode" value="local">
            Local only
        </label>
        <label>
            <input type="radio" name="qmode" value="remote">
            Remote only
        </label>
        <label>
            <input type="radio" name="qmode" value="disabled">
            Disabled
        </label>
    </div>

    <button class="btn" onclick="applyMode()">Apply</button>
    <span id="mode-feedback" class="feedback"></span>
</section>

<!-- ─── Backfill ───────────────────────────────────────────────────────────── -->
<section>
    <h2>Backfill Column</h2>

    <div class="field-row">
        <span class="label">Resource</span>
        <select id="bf-resource">
            <option value="vn">vn</option>
            <option value="character">character</option>
            <option value="release">release</option>
            <option value="producer">producer</option>
            <option value="staff">staff</option>
            <option value="tag">tag</option>
            <option value="trait">trait</option>
        </select>
    </div>

    <div class="field-row">
        <span class="label">Field</span>
        <input type="text" id="bf-field" placeholder="e.g.  gender  /  image.sexual">
    </div>

    <button class="btn" id="bf-btn" onclick="runBackfill()">Run Backfill</button>

    <div id="backfill-log"></div>
</section>

<script>
    const BASE = '/admin';
    let pollTimer = null;

    // ── Helpers ────────────────────────────────────────────────────────────────

    async function apiFetch(path, options) {
        const res = await fetch(BASE + path, options);
        const data = await res.json().catch(() => ({}));
        return { ok: res.ok, status: res.status, data };
    }

    // ── Query mode ─────────────────────────────────────────────────────────────

    const BADGE_CLASS = {
        default: 'badge-normal',
        local:    'badge-local',
        remote:   'badge-remote',
        disabled: 'badge-disabled',
    };

    function setModeBadge(mode) {
        const el = document.getElementById('current-mode');
        el.textContent = mode;
        el.className = 'badge ' + (BADGE_CLASS[mode] ?? '');
    }

    async function loadMode() {
        const { ok, data } = await apiFetch('/query-mode');
        if (!ok) return;
        setModeBadge(data.mode);
        const radio = document.querySelector(`input[name="qmode"][value="${data.mode}"]`);
        if (radio) radio.checked = true;
    }

    async function applyMode() {
        const selected = document.querySelector('input[name="qmode"]:checked');
        if (!selected) return;

        const fb = document.getElementById('mode-feedback');
        const { ok, data } = await apiFetch('/query-mode', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ mode: selected.value }),
        });

        if (ok) {
            setModeBadge(data.mode);
            fb.style.color = '#28a745';
            fb.textContent = 'Saved.';
        } else {
            fb.style.color = '#dc3545';
            fb.textContent = data.error ?? 'Error';
        }
        setTimeout(() => { fb.textContent = ''; }, 2000);
    }

    // ── Backfill ───────────────────────────────────────────────────────────────

    function logLine(text, cls) {
        const el = document.getElementById('backfill-log');
        el.style.display = 'block';
        const span = document.createElement('span');
        span.className = cls;
        span.textContent = text + '\n';
        el.appendChild(span);
        el.scrollTop = el.scrollHeight;
    }

    function clearLog() {
        const el = document.getElementById('backfill-log');
        el.style.display = 'none';
        el.innerHTML = '';
    }

    async function runBackfill() {
        const rt    = document.getElementById('bf-resource').value;
        const field = document.getElementById('bf-field').value.trim();

        if (!field) { alert('Field is required.'); return; }

        clearLog();
        const btn = document.getElementById('bf-btn');
        btn.disabled = true;
        logLine(`Starting backfill: ${rt}.${field} …`, 'log-info');

        const { ok, data } = await apiFetch('/backfill', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ resource_type: rt, field }),
        });

        if (!ok) {
            logLine('Error: ' + (data.error ?? 'Failed to start'), 'log-err');
            btn.disabled = false;
            return;
        }

        startPolling();
    }

    function startPolling() {
        if (pollTimer) clearInterval(pollTimer);
        pollTimer = setInterval(pollStatus, 2000);
    }

    async function pollStatus() {
        const { ok, data } = await apiFetch('/backfill/status');
        if (!ok) return;

        if (!data.running) {
            clearInterval(pollTimer);
            pollTimer = null;
            document.getElementById('bf-btn').disabled = false;

            if (data.last) {
                if (data.last.error) {
                    logLine('Error: ' + data.last.error, 'log-err');
                } else {
                    logLine(`Done — ${data.last.updated}/${data.last.total} updated.`, 'log-ok');
                }
            }
        }
    }

    // ── Init ───────────────────────────────────────────────────────────────────

    loadMode();
</script>

</body>
</html>
