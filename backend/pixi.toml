[tasks]
dev = "python launch.py dev"
dev-waitress = "python launch.py dev --waitress"
prod = "python launch.py prod"
# DB migration CLI (migration.py). Forward args after `--`, e.g.
#     pixi run migrate -- vndb upgrade
migrate = "python migration.py"
